# Full-stack production-mode compose for local testing.
#
# Prerequisites: CyberSim-UI must be cloned alongside this repo:
#   ../CyberSim-UI/
#
# Usage:
#   docker compose -f docker-compose.prod.yaml up --build
#
# To load scenario seed data after first start:
#   docker compose -f docker-compose.prod.yaml exec backend npm run reset-db:scenario
#
# To run any knex script:
#   docker compose -f docker-compose.prod.yaml exec backend npm run <script>
#
# Services:
#   db       → postgres:5432
#   backend  → http://localhost:8080
#   ui       → http://localhost:3000

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: turtlerock
      POSTGRES_USER: cybersim
      POSTGRES_DB: cybersim
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker_postgres_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cybersim"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    restart: unless-stopped
    environment:
      DB_URL: postgres://cybersim:turtlerock@db:5432/cybersim
      NODE_ENV: development
      PORT: 8080
      LOG_LEVEL: info
      SCENARIO_SLUG: cso
      UI_ORIGINS: http://localhost:3000
      # Optional — set to enable Airtable import:
      # AIRTABLE_ACCESS_TOKEN: your_token
      # AIRTABLE_BASE_IDS: cso:appXXXXXX
      IMPORT_PASSWORD: changeme
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: ../CyberSim-UI
      args:
        REACT_APP_API_URL: http://localhost:8080
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:

# Render.com Blueprint — CyberSim Backend
#
# Deploy steps:
#   1. Push this repo to GitHub/GitLab
#   2. In Render dashboard: New → Blueprint → connect your repo
#   3. After first deploy, set these env vars manually in the dashboard:
#      - UI_ORIGINS      e.g. https://cybersim-ui.onrender.com
#      - AIRTABLE_ACCESS_TOKEN
#      - AIRTABLE_BASE_IDS  e.g. cso:appXXXXXX,tnr:appYYYYYY
#   4. IMPORT_PASSWORD is auto-generated — copy it from the dashboard
#
# Migrations run automatically before each deploy via docker-entrypoint.sh.

services:
  - type: web
    name: cybersim-backend
    runtime: docker
    plan: free # $7/mo — keeps service alive. Use 'free' for dev/testing (sleeps after 15 min).
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_URL
        fromDatabase:
          name: cybersim-db
          property: connectionString
      - key: LOG_LEVEL
        value: info
      - key: SCENARIO_SLUG
        value: cso
      - key: IMPORT_PASSWORD
        generateValue: true
      # Set manually after first deploy:
      - key: UI_ORIGINS
        sync: false
      - key: AIRTABLE_ACCESS_TOKEN
        sync: false
      - key: AIRTABLE_BASE_IDS
        sync: false

databases:
  - name: cybersim-db
    databaseName: cybersim
    user: cybersim
    plan: free # 90-day free trial, then Starter at $7/mo
    ipAllowList: [] # Restricts access to Render's internal network only
